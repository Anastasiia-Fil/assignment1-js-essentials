<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Grade</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="brand">
        <span class="brand-title">My Profile</span>
      </a>
  

      <nav class="nav">
        <a href="index.html">Profile</a>
        <a class="active" href="grade.html">Grade</a>
        <a href="staff.html">Staff</a>
        <a href="temperature.html">Temperature</a>
      </nav>
    </div>
  </header>

  <!-- MAIN -->
  <div class="container">
    <main>
      <section class="section">
        <h2>Mark to Grade Converter</h2>
        <p class="help">
          Enter a mark between <b>0 and 100</b>.  
          The system will validate your input and show the correct grade.
        </p>

        <form class="form" onsubmit="return false;">
          <label class="label" for="markInput">Student Mark</label>
          <input
            class="input"
            id="markInput"
            type="text"
            placeholder="e.g. 87"
          />

          <button class="btn btn-primary" onclick="markToGrade()">
            Convert 
          </button>

          <!-- Validation message -->
          <div id="validationMessage" class="notice" style="display:none;"></div>

          <!-- Result -->
          <div id="gradeResult" class="notice" style="display:none;"></div>
        </form>
      </section>
    </main>

    <!-- FOOTER -->
    <footer class="site-footer">
      <div class="footer-pill">
        <span>Anastasiia Filippova</span>
        <span>©</span>
        <span id="year"></span>
        <span>•</span>
        <span id="today"></span>
      </div>
    </footer>
  </div>

  <script src="js/grade.js"></script>
</body>
</html>
