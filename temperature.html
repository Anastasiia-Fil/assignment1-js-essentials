<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Temperature Converter</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="brand">
        <span class="brand-title">My Profile</span>
      </a>
  

      <nav class="nav">
        <a href="index.html">Profile</a>
        <a href="grade.html">Mark → Grade</a>
        <a href="staff.html">Staff</a>
        <a class="active" href="temperature.html">Temperature</a>
      </nav>
    </div>
  </header>

  <!-- MAIN -->
  <div class="container">
    <main>
      <section class="section">
        <h2>Temperature Converter</h2>
        <p class="help">
          Enter a temperature value and select the unit.  
          The other two units will be calculated automatically.
        </p>

        <form class="form" oninput="convertTemperature()">
          <label class="label" for="tempInput">Temperature Value</label>
          <input
            class="input"
            id="tempInput"
            type="number"
            placeholder="Enter or select value: e.g. 25 "
          />

          <label class="label" for="unitSelect">Input Unit</label>
          <select id="unitSelect" class="input">
            <option value="celsius">Celsius (°C)</option>
            <option value="fahrenheit">Fahrenheit (°F)</option>
            <option value="kelvin">Kelvin (K)</option>
          </select>

          <div class="notice" id="resultC"> Celsius: —</div>
          <div class="notice" id="resultF"> Fahrenheit: —</div>
          <div class="notice" id="resultK"> Kelvin: —</div>
        </form>
      </section>
    </main>

    <!-- FOOTER -->
    <footer class="site-footer">
      <div class="footer-pill">
        <span>Anastasiia Filippova</span>
        <span>©</span>
        <span id="year"></span>
        <span>•</span>
        <span id="today"></span>
      </div>
    </footer>
  </div>

  <script src="js/temperature.js"></script>
</body>
</html>
